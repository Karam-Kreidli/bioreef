# C04 — EfficientNetV2-S fine-tuned (efficiency-oriented CNN). Single ROI crop, flat CE.
run_id: C04
name: efficientnetv2_s
priority: optional
description: >
  Efficiency-oriented CNN baseline: ImageNet-pretrained EfficientNetV2-S
  fine-tuned end-to-end on the ROI crop. Flat CE, random sampler. Breadth for the
  fine-tuned tier alongside C03 (ResNet-50) and C05 (ConvNeXt-T).

model_family: timm
timm_name: tf_efficientnetv2_s
pretrained: true

hslm: false
loss: ce
sampler: random

epochs: 60
warmup_epochs: 3
# 32 — the panel-wide batch size (fairness: same budget/protocol as C03/C05/C07).
# On the 8 GB benchmark GPUs this fits on a headless card; it only OOMs if the run
# shares a card with the desktop/X server, so pin it with --gpu instead of shrinking
# the batch (a smaller batch would be a second difference vs the other baselines).
batch_size: 32
lr: 0.0001
seeds: [0, 1, 2]
