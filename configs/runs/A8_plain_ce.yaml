# A8 — plain CE. NOT a one-variable ablation of C09: relative to C09 this
# changes BOTH hslm (true->false) and loss (cbfocal->ce).
#
# The valid single-factor comparison is the CHAIN:
#     C09 -> A6   remove hierarchical genus/family supervision (hslm off)
#     A6  -> A8   flat CB-Focal -> flat CE            <- this run
# A6 and A8 are identical except for `loss`, so A6 vs A8 isolates CB-Focal.
# Do NOT report C09 vs A8 as "the effect of cross-entropy".
run_id: A8
name: plain_ce
priority: core
description: 'Flat plain-CE endpoint of the loss chain C09 -> A6 -> A8. Isolates
  CB-Focal only when compared against A6, not against C09 (two factors differ
  from C09: hslm and loss).'
model_family: dino
backbone: dinov3
context_levels: 3
attention_depth: 1
unfreeze_blocks: 0
hslm: false
loss: ce
sampler: random            # matches the C09 reference (random sampler)
family_weight: 3.0
genus_weight: 2.0
species_weight: 1.0
epochs: 60
warmup_epochs: 3
batch_size: 32
lr: 0.0001
seeds:
- 0
- 1
- 2
