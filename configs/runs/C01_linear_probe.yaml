# C01 — Vanilla linear probe (lower bound). Frozen DINOv3, no context, flat CE.
run_id: C01
name: linear_probe
priority: core
description: >
  Linear-probe floor: frozen DINOv3 features -> linear head, no MCEAM, no
  hierarchy, plain CE, random sampler. The minimum-capability reference.

model_family: dino
backbone: dinov3
context_levels: 0          # no MCEAM (head on pooled ROI [CLS])
attention_depth: 1
unfreeze_blocks: 0

hslm: false                # flat softmax
loss: ce
sampler: random

epochs: 30
warmup_epochs: 3
batch_size: 32
lr: 0.0001
seeds: [0, 1, 2]
