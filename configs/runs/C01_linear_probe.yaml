# C01 — Vanilla linear probe (lower bound). Frozen DINOv3, no context, flat CE.
run_id: C01
name: linear_probe
priority: core
description: >
  Linear-probe floor: frozen DINOv3 features -> linear head, no MCEAM, no
  hierarchy, plain CE, random sampler. The minimum-capability reference.

model_family: dino
backbone: dinov3
context_levels: 0          # no MCEAM (head on pooled ROI [CLS])
attention_depth: 1
unfreeze_blocks: 0
probe: linear              # STRICT Linear(768, num_classes) — no LayerNorm, no
                           # hidden layer, no GELU. "Linear probe" is read
                           # strictly by reviewers; A2 keeps the MLP head.

hslm: false                # flat softmax
loss: ce
sampler: random

epochs: 60
warmup_epochs: 3
batch_size: 32
lr: 0.0001
seeds: [0, 1, 2]

# Augmentation is unified across the whole panel (incl. this probe), so the
# frozen ROI [CLS] now varies per epoch and CANNOT be cached — C01 runs the full
# per-epoch loop like the other frozen models. (Feature caching only applies to a
# strictly un-augmented probe; see loop.probe_cache_eligible.)
cache_features: false
