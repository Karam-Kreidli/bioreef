# A1 — Backbone: DINOv3 -> DINOv2. (C09 with backbone changed.)
run_id: A1
name: dinov2
priority: core
description: C09 with the backbone swapped to frozen DINOv2-base. Disentangles
  backbone generation from architecture in the MATANet comparison.

model_family: dino
backbone: dinov2           # <- the only change vs C09
context_levels: 3
attention_depth: 1
unfreeze_blocks: 0

hslm: true
loss: cbfocal
sampler: balanced
family_weight: 3.0
genus_weight: 2.0
species_weight: 1.0

epochs: 60
warmup_epochs: 3
batch_size: 32
lr: 0.0001
seeds: [0, 1, 2]
