# A3 — single-context-stream ablation: context streams 3 -> 1.
# context_levels=1 keeps only the FIRST of (social, habitat, full_frame), i.e. the
# ROI attends to the SOCIAL stream only. NOT "ROI-scale": the ROI is always the
# query; this ablates how many context streams it attends to.
# (C09 reference with exactly context_levels changed.)
run_id: A3
name: roi_scale        # result-dir name kept stable; see description for meaning
priority: core
description: 'C09 reference with one change: single context stream (social only) vs all three.'
model_family: dino
backbone: dinov3
context_levels: 1
attention_depth: 1
unfreeze_blocks: 0
hslm: true
loss: cbfocal
sampler: random            # matches the C09 reference (random sampler)
family_weight: 3.0
genus_weight: 2.0
species_weight: 1.0
epochs: 60
warmup_epochs: 3
batch_size: 32
lr: 0.0001
seeds:
- 0
- 1
- 2
