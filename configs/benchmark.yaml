# BioReef-Classify — benchmark definition (single source of truth).
#
# These rules DEFINE the benchmark: change them and you change which species and
# crops are included, and how they are split. Every script (train/test/export/
# make_subset) reads this file so they can never disagree on what the benchmark
# is. CLI flags override individual fields for one-off experiments.

# Dataset location — set ONCE here so no script needs --csv / --img_dir per run.
# Point these at your machine's paths (e.g. the VM's frame directory). Every
# script reads them from here; --csv / --img_dir still override for a one-off.
data:
  csv_path: /home/openuae/Desktop/bioreef-classify/bioreef/data/metadata/frame_metadata.csv   # OzFish annotation CSV
  img_dir: /home/openuae/Desktop/bioreef-classify/bioreef/data/frames                 # primary directory containing the crop frames
  # Default compute device. Empty = auto (cuda:0 if available, else cpu).
  # --gpu on run.py/test.py overrides this (e.g. run different configs on
  # different GPUs in parallel from separate shells).
  device: ""                      # e.g. "cuda:0", "cuda:1", "cpu"
  # If frames are spread across multiple folders, list the extras here. Each
  # frame is looked up in img_dir first, then these in order (first match wins).
  # Leave empty ([]) for a single flat folder.
  extra_img_dirs: []
  #   e.g.
  # extra_img_dirs:
  #   - frames_part1
  #   - frames_part2
  # Missing crops: rows whose image is absent on disk are skipped BEFORE the
  # species filters and split run, so an incomplete frame directory silently
  # yields a DIFFERENT benchmark (species count, class indices, deployment
  # assignment and split sizes all shift) with only a warning.
  # Set true for the FINAL CAMPAIGN so a partial dataset is a hard error.
  strict_images: false

inclusion:
  # A species is included iff it clears BOTH thresholds (and is not a placeholder).
  min_samples: 20          # >= this many crops
  min_deployments: 3       # appears in >= this many distinct BRUVS deployments
                           # (guarantees it can be split across all three folds)
  filter_placeholders: true   # drop sp1/sp3/unidentified/fish/etc.

split:
  # Leakage-safe split is grouped by deployment; ratios are over crops (deployment
  # sizes vary, so realised ratios drift slightly from these targets).
  ratios: [0.70, 0.15, 0.15]   # train / val / test
  split_seed: 0                # FIXED across all model runs — keeps the benchmark
                               # split constant; vary --seed for model init only.
