# Campaign — WHICH runs to launch, in one place.
#
# Edit this list to control the whole batch, then:
#     python scripts/run.py --campaign
# It runs each listed config (at the seeds below, or each config's own `seeds:`
# if 'seeds' here is null), skipping any run that already has a metrics.json —
# so it is safely resumable.
#
# Comment out a line to skip that run without deleting it.

# Seeds for the whole campaign. Set to null to use each run config's own `seeds:`.
seeds: [0, 1, 2]

# The runs to execute, by id (resolved from configs/runs/<id>_*.yaml).
runs:
  # --- benchmark panel (K.1, Core) ---
  - C01        # linear probe (lower bound)
  - C03        # ResNet-50
  - C05        # ConvNeXt-T
  - C07        # Swin-B
  - C09        # proposed reference (random sampler)
  # C08 MATANet runs from the official repo, not here — see configs/runs/C08_matanet.yaml

  # --- ablations (K.2) — renumbered contiguous A1-A11 (2026-07-17) ---
  - A1         # DINOv2 backbone
  - A2         # no MCEAM (context off) — also the ROI-only anchor
  - A3         # single context stream (social only)
  - A4         # attention depth 2
  - A5         # attention depth 4 (was A4b)
  - A6         # flat softmax, no hierarchy (was A5)
  - A7         # balanced sampler (was A6) — the sampler ablation
  - A8         # plain CE species loss (was A7)
  - A9         # adaptation: last 2 backbone blocks unfrozen (was A10)
  - A10        # adaptation: last 4 backbone blocks unfrozen (was A11)
  - A11        # adaptation: all 12 blocks unfrozen — full-FT frontier endpoint (was A12)
  # Retired (configs kept as RETIRED_*.yaml for traceability):
  #   old A8 (no_longtail) — became identical to A7/now-A8 after the sampler swap
  #   old A9 (roi_only)    — mechanically equivalent to A2 (context_levels=0)

  # --- Optional tier (K.1) — breadth for the fine-tuned baselines ---
  - C04        # EfficientNetV2-S fine-tuned
  - C06        # ViT-B/16 fine-tuned — the frozen-vs-fine-tuned counterpart to C09
  # C02 still deferred: a DINOv2 linear probe is redundant with ablation A1,
  # which already carries the DINOv2-vs-DINOv3 comparison (K.1 note).
  # - C02      # DINOv2 linear probe (redundant with A1)
